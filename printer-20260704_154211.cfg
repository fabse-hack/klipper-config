#[include shell_command.cfg]
#[include kiauh_macros.cfg]
[include mainsail.cfg]
[include macros.cfg]
#[include spoolman.cfg]
[include neopixel_status.cfg]
[include neopixel_farben.cfg]
#[include K-ShakeTune/*.cfg]
#[include calibrate.cfg]
#[include heater_verify.cfg]
[include KAMP/Configuration/KAMP_Settings.cfg]
[include KAMP/Configuration/Line_Purge.cfg]
# Falls du auch das adaptive Mesh willst:
[include KAMP/Configuration/Adaptive_Meshing.cfg]

# Y #################################################################################################

[stepper_y] # runs on M3 [ZM]
step_pin: PA15
dir_pin: PF8
enable_pin: !PC9
microsteps: 16
rotation_distance: 32
endstop_pin: !PC1
position_min: 0
position_endstop: 0
position_max: 230
homing_speed: 30.0

[tmc2209 stepper_y] # runs on M3 [ZM]
uart_pin: PC8
run_current: 0.800
diag_pin: #PC0
stealthchop_threshold: 0
interpolate: true

# X #################################################################################################

[stepper_x]  # runs on M2 [YM]
step_pin: PD3
dir_pin: PD2
enable_pin: !PD5
microsteps: 16
rotation_distance: 32
endstop_pin: EBBCan:PB6
position_endstop: 0
position_max: 230
homing_speed: 30

[tmc2209 stepper_x] # runs on M2 [YM]
uart_pin: PD4
run_current: 0.800
diag_pin: #PC1
stealthchop_threshold: 0
interpolate: true

# Z #################################################################################################

[stepper_z] # runs on M1 [XM]
step_pin: PF9
dir_pin: PD7
enable_pin: !PD6
microsteps: 16
rotation_distance: 32
endstop_pin: probe:z_virtual_endstop
position_max: 200
position_min: -5
homing_speed: 10

[tmc2209 stepper_z] # runs on M1 [XM]
uart_pin: PF10
run_current: 0.800
diag_pin: #PB5
stealthchop_threshold: 0
interpolate: true

# Extruder #################################################################################################

[tmc2209 extruder]
uart_pin: EBBCan:PA15
run_current: 0.800
interpolate: true
stealthchop_threshold: 0
# diag_pin:

[extruder]
step_pin: EBBCan:PD0
dir_pin: !EBBCan:PD1
enable_pin: !EBBCan:PD2
microsteps: 16
gear_ratio: 50:10
rotation_distance: 23.2
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBCan:PB13
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: EBBCan:PA3
pressure_advance: 0.032
#control: pid
#pid_Kp: 22.2
#pid_Ki: 1.08
#pid_Kd: 114
min_temp: 0
max_temp: 260
max_extrude_cross_section: 5
max_extrude_only_distance: 101
min_extrude_temp: 180

############################################
# FANS
############################################

[heater_fan extruder_fan]
pin: EBBCan:PA0 # FAN 1
heater: extruder
heater_temp: 50.0

[fan]
pin: EBBCan:PA1 # FAN 2

[temperature_fan Mainboard]
pin: PD13
sensor_type: temperature_mcu
max_power: 1.0
shutdown_speed: 1.0
hardware_pwm: false
kick_start_time: 0.5
off_below: 0.4
max_temp: 100
min_temp: 20
target_temp: 50
max_speed: 1.0
min_speed: 0.3
control: pid
pid_Kp: 1
pid_Ki: 1
pid_Kd: 1

############################################
# Heatbed & Mesh
############################################

[heater_bed]
heater_pin: PB3
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PB2
#control: pid
#pid_kp: 67.648
#pid_ki: 1.044
#pid_kd: 1095.893
min_temp: 0
max_temp: 110

[bltouch]
sensor_pin: ^EBBCan:PB8
control_pin: EBBCan:PB9
x_offset: 0
y_offset: 21
samples: 3
speed: 2
samples_tolerance: 3
sample_retract_dist: 5

[bed_mesh]
mesh_min: 2,20
mesh_max: 230,220
probe_count: 7,7
# mesh_pps: 2,3
algorithm: bicubic
speed: 150
horizontal_move_z: 12


[safe_z_home]
home_xy_position: 122.5, 100
speed: 50.0
z_hop: 20

[gcode_macro probe_reset]
gcode:
    SET_PIN PIN=probe_reset_pin VALUE=0
    G4 P300
    SET_PIN PIN=probe_reset_pin VALUE=1
    G4 P100

############################################
# sonstiges
############################################

[neopixel case_led]
pin: PE4
chain_count: 24
color_order: GRB # WS2812B
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0
initial_WHITE: 0.0

[neopixel toolhead_led]
pin: EBBCan:PD3
chain_count: 3
color_order: GRBW
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0
initial_WHITE: 0.0

[input_shaper]
shaper_freq_x: 86.2
shaper_type_x: mzv
shaper_freq_y: 39.6
shaper_type_y: mzv

[temperature_sensor Raspi]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

[temperature_sensor Toolhead_Chip]
sensor_type: temperature_mcu
sensor_mcu: EBBCan

############################################
# MCU & Printer
############################################

[mcu]
canbus_uuid: 79fd721e5073

[mcu EBBCan]
canbus_uuid: d0d81798263c

[printer]
kinematics: corexz
max_velocity: 300
max_accel: 3000
max_z_velocity: 40
max_z_accel: 1000
square_corner_velocity: 10

############################################
# Input Shaper Config
############################################

[adxl345]
cs_pin: EBBCan:PB12
spi_software_sclk_pin: EBBCan:PB10
spi_software_mosi_pin: EBBCan:PB11
spi_software_miso_pin: EBBCan:PB2
axes_map: x, y, z

[resonance_tester]
accel_chip: adxl345
probe_points: 115, 115, 20


